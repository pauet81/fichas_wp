services:
  db:
    image: mariadb
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: favnzzb_bk3c1
      MYSQL_USER: wp
      MYSQL_PASSWORD: wp
    volumes:
      - ./db:/var/lib/mysql


  wordpress:
    image: wordpress:php8.2-apache
    container_name: fichas_wp
    ports:
      - "8080:80"
    volumes:
      - ./wordpress:/var/www/html
    depends_on:
      - db

  adminer:
    image: adminer
    container_name: fichas_adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
